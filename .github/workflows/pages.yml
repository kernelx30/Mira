name: Deploy Mira Guide

on:
  push:
    branches: [main]
    paths:
      - "docs/Mira_User_Guide_CN.html"
      - "docs/Mira_Plugin_Development_CN.html"
      - "docs/index.html"
      - "docs/assets/mira-icon.svg"
      - "docs/assets/guide/beginner/**"
      - "docs/assets/README_examples/mira/**"
      - "market/**"
      - "tools/build_mira_market_registry.mjs"
      - ".github/workflows/pages.yml"
  issues:
    types: [opened, edited, closed, reopened, deleted]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/assets/guide _site/assets/README_examples
          cp docs/Mira_User_Guide_CN.html _site/index.html
          cp docs/Mira_Plugin_Development_CN.html _site/plugin.html
          cp docs/Mira_Plugin_Development_CN.html _site/Mira_Plugin_Development_CN.html
          cp docs/assets/mira-icon.svg _site/assets/mira-icon.svg
          cp -R docs/assets/guide/beginner _site/assets/guide/
          cp -R docs/assets/README_examples/mira _site/assets/README_examples/
          mkdir -p _site/market/v2
          mirror_base="https://static.operit.app/market/v2"

          mirror_json() {
            local remote_path="$1"
            local output_path="_site/market/v2/$remote_path"
            mkdir -p "$(dirname "$output_path")"
            curl --fail --silent --show-error --location --retry 3 \
              --connect-timeout 20 --max-time 60 \
              "$mirror_base/$remote_path" -o "$output_path"
          }

          mirror_paged_list() {
            local list_path="$1"
            local first_page="_site/market/v2/$list_path/updated/page-1.json"
            mkdir -p "$(dirname "$first_page")"
            if ! curl --fail --silent --show-error --location --retry 3 \
              --connect-timeout 20 --max-time 60 \
              "$mirror_base/$list_path/updated/page-1.json" -o "$first_page"; then
              rm -f "$first_page"
              return 0
            fi
            local total page_size page_count
            total="$(jq -r '.total // 0' "$first_page")"
            page_size="$(jq -r '.pageSize // 100' "$first_page")"
            page_size="${page_size:-100}"
            page_count=$(( (total + page_size - 1) / page_size ))
            for page in $(seq 2 "$page_count"); do
              local page_path="_site/market/v2/$list_path/updated/page-$page.json"
              if ! curl --fail --silent --show-error --location --retry 3 \
                --connect-timeout 20 --max-time 60 \
                "$mirror_base/$list_path/updated/page-$page.json" -o "$page_path"; then
                rm -f "$page_path"
                break
              fi
            done
            for sort in downloads likes; do
              local sort_dir="_site/market/v2/$list_path/$sort"
              mkdir -p "$sort_dir"
              if ! curl --fail --silent --show-error --location --retry 3 \
                --connect-timeout 20 --max-time 60 \
                "$mirror_base/$list_path/$sort/page-1.json" -o "$sort_dir/page-1.json"; then
                rm -f "$sort_dir/page-1.json"
                continue
              fi
              total="$(jq -r '.total // 0' "$sort_dir/page-1.json")"
              page_size="$(jq -r '.pageSize // 100' "$sort_dir/page-1.json")"
              page_size="${page_size:-100}"
              page_count=$(( (total + page_size - 1) / page_size ))
              for page in $(seq 2 "$page_count"); do
                if ! curl --fail --silent --show-error --location --retry 3 \
                  --connect-timeout 20 --max-time 60 \
                  "$mirror_base/$list_path/$sort/page-$page.json" \
                  -o "$sort_dir/page-$page.json"; then
                  rm -f "$sort_dir/page-$page.json"
                  break
                fi
              done
            done
          }

          mirror_json "manifest.json"
          types="$(jq -r '.types[].id' _site/market/v2/manifest.json)"
          categories="$(jq -r '.categories[].id' _site/market/v2/manifest.json)"
          mirror_paged_list "lists/all"
          for type in $types; do
            mirror_paged_list "lists/type/$type"
          done
          for category in $categories; do
            mirror_paged_list "lists/category/$category"
            for type in $types; do
              mirror_paged_list "lists/type/$type/category/$category"
            done
          done

          # Detail pages address entries by a stable two-character FNV shard.
          mkdir -p _site/market/v2/entries _site/market/v2/private/publishers
          for i in $(seq 0 255); do
            shard="$(printf '%02x' "$i")"
            for prefix in entries private/publishers; do
              target="_site/market/v2/$prefix/$shard.json"
              remote="$mirror_base/$prefix/$shard.json"
              if ! curl --fail --silent --show-error --location --retry 2 \
                --connect-timeout 10 --max-time 30 "$remote" -o "$target"; then
                rm -f "$target"
              fi
            done
          done
          GITHUB_TOKEN="${{ github.token }}" node tools/build_mira_market_registry.mjs \
            --site _site --repo "${{ github.repository }}"
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
